<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Blackhall Orbit</title>
    <style>
        body { 
            font-family: sans-serif; 
            color: white; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Using a Direct Internet Link to ensure it loads on GitHub */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .orbit-container {
            position: relative;
            width: 500px;
            height: 500px;
        }

        .orbit-ring {
            position: absolute;
            width: 100%; height: 100%;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        #celestial-body {
            position: absolute;
            font-size: 3.5rem;
            transform: translate(-50%, -50%);
            z-index: 20;
            filter: drop-shadow(0 0 15px orange);
        }

        .card { 
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.5); 
            padding: 40px; 
            border-radius: 50%; 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            width: 250px; height: 250px;
            text-align: center;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #clock-display { font-size: 1.6rem; font-weight: bold; }
        #temp-display { font-size: 4.5rem; font-weight: 100; margin: 0; }
    </style>
</head>
<body>

    <div class="orbit-container">
        <div class="orbit-ring"></div>
        <div id="celestial-body">☀️</div>

        <div class="card">
            <div style="font-size: 0.7rem; letter-spacing: 3px; opacity: 0.6;">BLACKHALL</div>
            <div id="clock-display">00:00:00</div>
            <div id="temp-display">--°</div>
        </div>
    </div>

    <script>
        function update() {
            const now = new Date();
            document.getElementById('clock-display').innerText = now.toLocaleTimeString();

            const hrs = now.getHours();
            const totalSecs = 24 * 60 * 60;
            const currentSecs = (hrs * 3600) + (now.getMinutes() * 60) + now.getSeconds();
            const angle = ((currentSecs / totalSecs) * 2 * Math.PI) + (Math.PI / 2);
            
            const sun = document.getElementById('celestial-body');
            const radius = 250; 
            
            sun.style.left = (radius + radius * Math.cos(angle)) + "px";
            sun.style.top = (radius + radius * Math.sin(angle)) + "px";

            // Switch icon based on time
            sun.innerText = (hrs >= 6 && hrs < 19) ? "☀️" : "🌙";
        }

        async function getWeather() {
            try {
                const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=54.7460&longitude=-1.2825&current_weather=true");
                const data = await res.json();
                document.getElementById('temp-display').innerText = Math.round(data.current_weather.temperature) + "°";
            } catch (e) {
                document.getElementById('temp-display').innerText = "10°"; // Fallback
            }
        }

        setInterval(update, 1000);
        update();
        getWeather();
    </script>
</body>
</html>
